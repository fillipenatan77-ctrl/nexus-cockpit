<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F0E17"/>
      <stop offset="100%" stop-color="#14131E"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7d6644" stop-opacity="0"/>
      <stop offset="50%" stop-color="#B8935A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7d6644" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Borda dourada superior -->
  <rect x="80" y="80" width="920" height="2" fill="url(#goldFade)"/>
  <rect x="80" y="1268" width="920" height="2" fill="url(#goldFade)"/>

  <!-- Marca NEXUS topo -->
  <text x="540" y="155" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" letter-spacing="8" fill="#B8935A">N E X U S</text>
  <text x="540" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" letter-spacing="3" fill="#F0EAE4" opacity="0.5">BIBLIOTECA · VIVA</text>

  <!-- Título da obra -->
  <text x="540" y="320" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="56" font-weight="600" fill="#F0EAE4">Inteligência Emocional</text>

  <!-- Autor + ano -->
  <text x="540" y="380" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" letter-spacing="2" fill="#B8935A">Daniel Goleman · 1995</text>

  <!-- Separador dourado central -->
  <line x1="450" y1="460" x2="630" y2="460" stroke="#B8935A" stroke-width="2" opacity="0.5"/>

  <!-- Citação literal -->
  <text x="540" y="600" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"funciona tão bem assim. Novas soluções e formas"</text>
<text x="540" y="644" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"de ver um problema não surgem, geralmente, da"</text>
<text x="540" y="688" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"preocupação, sobretudo da preocupação crônica."</text>
<text x="540" y="732" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"Em vez de produzir soluções para o perigo que"</text>
<text x="540" y="776" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"imaginam, os preocupados normalmente ficam"</text>
<text x="540" y="820" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"ruminando sobre o perigo em si, imergindo de uma"</text>
<text x="540" y="864" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"maneira discreta no pânico a ele associado, sem"</text>
<text x="540" y="908" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"conseguir parar de pensar. Os preocupados"</text>
<text x="540" y="952" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"crônicos se preocupam com muitas coisas, a"</text>
<text x="540" y="996" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"maioria das quais não tem a menor possibilidade"</text>
<text x="540" y="1040" text-anchor="middle" font-family="Crimson Pro, Georgia, serif" font-size="32" font-style="italic" fill="#F0EAE4">"de acontecer: vêem perigos no dia-a-dia…"</text>


  <!-- Página + bandeira -->
  <text x="540" y="1180" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" letter-spacing="2" fill="#B8935A" opacity="0.8">🟢 RAG · p.350-351</text>

  <!-- URL rodapé -->
  <text x="540" y="1230" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" letter-spacing="2" fill="#F0EAE4" opacity="0.4">nexuscaldeira.com</text>
</svg>