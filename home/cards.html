// ====================================================
// Render SVG vertical 1080x1350
// ====================================================

function renderCardSVG(c, id = '') {
  // Quebra texto em tspans
  const linesTexto = c.texto.split('\n');
  const linesComm = (c.comentario || '').split('\n');

  // Calcular tamanho da fonte do texto principal baseado em linhas e largura
  const maxLines = linesTexto.length;
  let fontSize = 68;
  if (maxLines >= 5) fontSize = 52;
  else if (maxLines === 4) fontSize = 58;
  else if (maxLines === 3) fontSize = 64;

  const lineHeight = fontSize * 1.15;
  const startY = 540 - (maxLines - 1) * lineHeight / 2;

  const textSpans = linesTexto.map((line, i) =>
    `<tspan x="540" dy="${i === 0 ? 0 : lineHeight}">${escapeXml(line)}</tspan>`
  ).join('');

  const commFontSize = 22;
  const commLineHeight = commFontSize * 1.3;
  const commStartY = 1090 - (linesComm.length - 1) * commLineHeight / 2;
  const commSpans = linesComm.map((line, i) =>
    `<tspan x="540" dy="${i === 0 ? 0 : commLineHeight}">${escapeXml(line)}</tspan>`
  ).join('');

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="100%" height="auto">
  <defs>
    <linearGradient id="g${id}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14131E"/>
      <stop offset="100%" stop-color="#0F0E17"/>
    </linearGradient>
    <radialGradient id="s${id}" cx="0.5" cy="0.28" r="0.85">
      <stop offset="0%" stop-color="#1C1826" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0F0E17" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#g${id})"/>
  <rect width="1080" height="1350" fill="url(#s${id})"/>

  <text x="80" y="140" font-family="Georgia, serif" font-size="52" fill="#B8935A" font-style="italic">${escapeXml(c.glifo)}</text>
  <text x="1000" y="140" font-family="'JetBrains Mono', monospace" font-size="16" fill="#B8935A" fill-opacity="0.5" text-anchor="end" letter-spacing="2">${escapeXml(c.estacao)}</text>

  <text x="540" y="${startY}" font-family="Georgia, serif" font-size="${fontSize}" fill="#F0EAE4" text-anchor="middle" font-weight="400">
    ${textSpans}
  </text>

  <line x1="340" y1="850" x2="740" y2="850" stroke="#B8935A" stroke-opacity="0.45" stroke-width="1"/>

  <text x="540" y="920" font-family="Inter, Arial, sans-serif" font-size="30" fill="#B8935A" text-anchor="middle" letter-spacing="3" font-weight="500">${escapeXml(c.autor)}</text>
  <text x="540" y="960" font-family="Inter, Arial, sans-serif" font-size="20" fill="#F0EAE4" fill-opacity="0.6" text-anchor="middle" font-style="italic">${escapeXml(c.obra)}</text>

  <text x="540" y="${commStartY}" font-family="Georgia, serif" font-size="${commFontSize}" fill="#F0EAE4" fill-opacity="0.72" text-anchor="middle" font-style="italic">
    ${commSpans}
  </text>

  <text x="540" y="1285" font-family="'JetBrains Mono', monospace" font-size="13" fill="#B8935A" fill-opacity="0.5" text-anchor="middle" letter-spacing="4">NEXUS · ${escapeXml((c.id || '').toUpperCase())}</text>
</svg>`;
}

function escapeXml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

// ====================================================
// Grid + Filtros
// ====================================================

let currentCat = 'all';
let currentCard = null;

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = currentCat === 'all' ? CARDS : CARDS.filter(c => c.cat === currentCat);
  document.getElementById('count').textContent = filtered.length + ' card' + (filtered.length !== 1 ? 's' : '');
  filtered.forEach(c => {
    const div = document.createElement('div');
    div.className = 'card-thumb';
    div.dataset.id = c.id;
    div.innerHTML = '<div class="cat-tag">' + c.cat + '</div>' + renderCardSVG(c, '_thumb_' + c.id);
    div.onclick = () => openModal(c);
    grid.appendChild(div);
  });
}

document.querySelectorAll('.filter').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.filter').forEach(f => f.classList.remove('active'));
    b.classList.add('active');
    currentCat = b.dataset.cat;
    renderGrid();
  };
});

function openModal(c) {
  currentCard = c;
  document.getElementById('modal-svg').innerHTML = renderCardSVG(c, '_big_' + c.id).replace('<svg ', '<svg class="big" ');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// Click em fora do card fecha modal
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

// ====================================================
// Downloads & Share
// ====================================================

function downloadSVG() {
  if (!currentCard) return;
  const svgText = renderCardSVG(currentCard);
  const blob = new Blob([svgText], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'nexus-' + currentCard.id + '.svg';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

async function downloadPNG() {
  if (!currentCard) return;
  const svgText = renderCardSVG(currentCard);
  const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
  const svgUrl = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = 1080;
    canvas.height = 1350;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    canvas.toBlob((blob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'nexus-' + currentCard.id + '.png';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 100);
    }, 'image/png');
    URL.revokeObjectURL(svgUrl);
  };
  img.onerror = function() {
    alert('Erro ao gerar PNG. Tente baixar SVG em vez disso.');
  };
  img.src = svgUrl;
}

  if (!currentCard) return;
  const title = 'NEXUS · ' + (currentCard.autor || currentCard.tag);
  const text = currentCard.texto.replace(/\n/g, ' ') + '\n\n— ' + currentCard.autor + ', ' + currentCard.obra + '\n\n' + (currentCard.comentario || '').replace(/\n/g, ' ') + '\n\nNEXUS · ' + currentCard.id;
  try {
    // Tenta compartilhar com arquivo PNG
    const svgText = renderCardSVG(currentCard);
    const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
    const svgUrl = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = async function() {
      const canvas = document.createElement('canvas');
      canvas.width = 1080;
      canvas.height = 1350;
      canvas.getContext('2d').drawImage(img, 0, 0);
      canvas.toBlob(async (blob) => {
        const file = new File([blob], 'nexus-' + currentCard.id + '.png', { type: 'image/png' });
        try {
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ title: title, text: text, files: [file] });
          } else if (navigator.share) {
            await navigator.share({ title: title, text: text });
          } else {
            await navigator.clipboard.writeText(text);
            alert('Copiado pra área de transferência');
          }
        } catch (e) { /* user cancelled */ }
        URL.revokeObjectURL(svgUrl);
      }, 'image/png');
    };
    img.src = svgUrl;
  } catch (e) {
    if (navigator.share) {
      try { await navigator.share({ title: title, text: text }); } catch (er) {}
    } else {
      await navigator.clipboard.writeText(text);
      alert('Copiado pra área de transferência');
    }
  }
}

// Inicializar
renderGrid();
</script>
