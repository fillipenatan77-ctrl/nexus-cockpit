<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>NEXUS · Glossário Vivo</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="./manifest.json">
<style>
  html,body { margin:0; padding:0; background:#0f0f14; color:#e8e8ed; font-family:-apple-system,Inter,system-ui,sans-serif; line-height:1.6; }
  header { padding: 16px 20px; border-bottom:1px solid #2a2a35; position:sticky; top:0; background:rgba(15,15,20,0.95); backdrop-filter:blur(10px); z-index:10; }
  header h1 { margin:0; font-size:17px; color:#d4a574; }
  header .meta { font-size:12px; color:#888; margin-top:4px; }
  .search { padding:12px 20px; background:rgba(30,30,38,0.5); position:sticky; top:68px; z-index:9; }
  .search input { width:100%; padding:10px 14px; border-radius:8px; border:1px solid #3a3a4a; background:#1a1a22; color:#e8e8ed; font-size:14px; box-sizing:border-box; }
  main { padding:20px; max-width:720px; margin:0 auto; }
  .letter { color:#d4a574; font-size:14px; font-weight:600; margin:28px 0 12px; padding:6px 0; border-bottom:1px solid #2a2a35; position:sticky; top:128px; background:rgba(15,15,20,0.95); backdrop-filter:blur(6px); }
  .term { margin:16px 0; padding:12px 14px; background:rgba(30,30,38,0.5); border-radius:8px; border-left:3px solid #d4a574; }
  .term h3 { margin:0 0 8px; font-size:15px; color:#e8e8ed; }
  .term .def { font-size:13px; margin:6px 0; }
  .term .src { font-size:11px; color:#888; font-style:italic; }
  .back { display:inline-block; margin:20px; color:#d4a574; text-decoration:none; font-size:13px; padding:8px 14px; background:rgba(30,30,38,0.5); border-radius:6px; border:1px solid #3a3a4a; }
</style>
</head>
<body>
<header>
  <h1>NEXUS · Glossário Vivo</h1>
  <div class="meta" id="meta">carregando...</div>
</header>
<div class="search"><input id="q" type="search" placeholder="buscar termo, autor ou obra..."></div>
<main id="content">carregando...</main>
<a class="back" href="./">← voltar ao hub</a>
<script>
(async function(){
  try {
    const res = await fetch('https://raw.githubusercontent.com/fillipenatan77-ctrl/NEXUS/main/00_HUB/GLOSSARIO.md?t='+Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const md = await res.text();

    // Parser simples do markdown
    const blocks = md.split(/\n## /).slice(1);
    const letters = {};
    let totalTerms = 0;
    for (const block of blocks) {
      const [letterLine, ...rest] = block.split('\n');
      const L = letterLine.trim();
      if (!/^[A-Z#]$/.test(L)) continue;
      const body = rest.join('\n');
      const termBlocks = body.split(/\n### /).slice(1);
      letters[L] = termBlocks.map(tb => {
        const [termLine, ...termRest] = tb.split('\n');
        const termo = termLine.trim();
        totalTerms++;
        const defs = [];
        const lines = termRest.join('\n').split('\n');
        for (let i = 0; i < lines.length; i++) {
          const m = lines[i].match(/^- \*\*(.+?)\*\*\s*$/);
          if (m) {
            const defText = m[1];
            const srcMatch = (lines[i+1] || '').match(/^\s*\*— (.+)\*/);
            defs.push({ def: defText, src: srcMatch ? srcMatch[1] : null });
          }
        }
        return { termo, defs };
      });
    }

    document.getElementById('meta').textContent = totalTerms + ' termos · ' + Object.keys(letters).length + ' letras · atualizado em tempo real';

    function render(filter) {
      filter = (filter || '').toLowerCase().trim();
      const html = [];
      for (const L of Object.keys(letters).sort()) {
        const filtered = letters[L].filter(t => !filter ||
          t.termo.toLowerCase().includes(filter) ||
          t.defs.some(d => d.def.toLowerCase().includes(filter) || (d.src || '').toLowerCase().includes(filter))
        );
        if (!filtered.length) continue;
        html.push('<div class="letter">' + L + '</div>');
        for (const t of filtered) {
          html.push('<div class="term"><h3>' + t.termo + '</h3>');
          for (const d of t.defs) {
            html.push('<div class="def">' + d.def + '</div>');
            if (d.src) html.push('<div class="src">— ' + d.src + '</div>');
          }
          html.push('</div>');
        }
      }
      document.getElementById('content').innerHTML = html.join('') || '<em style="color:#888;">Nenhum resultado.</em>';
    }
    render('');
    document.getElementById('q').addEventListener('input', e => render(e.target.value));
  } catch (e) {
    document.getElementById('content').innerHTML = '<em style="color:#ef4444;">Erro ao carregar: ' + e.message + '</em>';
  }
})();
</script>
</body>
</html>
