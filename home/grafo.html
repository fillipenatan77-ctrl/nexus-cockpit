<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>NEXUS · Grafo Conceitual</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="./manifest.json">
<style>
  html, body { margin: 0; padding: 0; background: #0f0f14; color: #e8e8ed; font-family: -apple-system, Inter, system-ui, sans-serif; overflow: hidden; height: 100%; }
  header { position: fixed; top: 0; left: 0; right: 0; padding: 12px 20px; background: rgba(15,15,20,0.9); backdrop-filter: blur(8px); z-index: 10; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a35; }
  header h1 { margin: 0; font-size: 15px; color: #d4a574; }
  header .meta { font-size: 11px; color: #888; }
  .tooltip { position: fixed; background: rgba(25,25,32,0.95); border: 1px solid #3a3a4a; padding: 10px 14px; border-radius: 8px; font-size: 13px; pointer-events: none; max-width: 280px; z-index: 100; backdrop-filter: blur(4px); }
  .tooltip b { color: #d4a574; }
  .tooltip em { color: #8b6f47; font-style: normal; display: block; margin-top: 4px; }
  .tooltip small { color: #888; display: block; margin-top: 6px; font-size: 11px; line-height: 1.4; }
  svg { display: block; width: 100vw; height: 100vh; }
  .back { position: fixed; bottom: 20px; left: 20px; color: #d4a574; text-decoration: none; font-size: 13px; padding: 8px 14px; background: rgba(25,25,32,0.85); border-radius: 6px; border: 1px solid #3a3a4a; z-index: 10; }
</style>
</head>
<body>
<header>
  <h1>NEXUS · Grafo Conceitual</h1>
  <span class="meta" id="meta">carregando...</span>
</header>
<svg></svg>
<div class="tooltip" id="tip" style="display:none"></div>
<a class="back" href="./">← voltar ao hub</a>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(async function(){
  const res = await fetch('./grafo.json?t=' + Date.now());
  const data = await res.json();
  document.getElementById('meta').textContent = data.nodes_count + ' obras · ' + data.edges_count + ' conexoes';

  const svg = d3.select('svg');
  const w = window.innerWidth, h = window.innerHeight;
  const g = svg.append('g');

  svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform)));

  const colors = { converge: '#4ade80', diverge: '#ef4444', apoia: '#60a5fa', apoiado_por: '#fbbf24' };

  const sim = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.edges).id(d => d.id).distance(120))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(w/2, h/2))
    .force('collide', d3.forceCollide(30));

  const link = g.append('g').selectAll('line').data(data.edges).enter().append('line')
    .attr('stroke', d => colors[d.type] || '#555')
    .attr('stroke-opacity', 0.5).attr('stroke-width', 1.5);

  const node = g.append('g').selectAll('g').data(data.nodes).enter().append('g')
    .call(d3.drag()
      .on('start', (e, d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if(!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  node.append('circle')
    .attr('r', 8).attr('fill', '#d4a574').attr('stroke', '#1a1a1a').attr('stroke-width', 2);
  node.append('text')
    .attr('x', 12).attr('y', 4)
    .attr('font-size', 11).attr('fill', '#e8e8ed')
    .text(d => d.autor.substring(0, 20));

  const tip = document.getElementById('tip');
  node.on('mouseover', (e, d) => {
    tip.style.display = 'block';
    tip.style.left = (e.pageX + 10) + 'px';
    tip.style.top = (e.pageY + 10) + 'px';
    tip.innerHTML = '<b>' + d.titulo + '</b><em>' + d.autor + ' · ' + d.ano + '</em><small>' + (d.tese || '(sem tese registrada)') + '</small>';
  }).on('mouseout', () => tip.style.display = 'none');

  sim.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
  });
})();
</script>
</body>
</html>
