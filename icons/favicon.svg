<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0E17"/>
      <stop offset="100%" stop-color="#14131E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4A668"/>
      <stop offset="50%" stop-color="#B8935A"/>
      <stop offset="100%" stop-color="#7d6644"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="92" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.45"/>
  <g filter="url(#glow)">
    <text x="256" y="340" font-family="Georgia, 'Crimson Pro', serif" font-size="320" font-weight="600" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="-12">N</text>
  </g>
  <line x1="180" y1="412" x2="240" y2="412" stroke="#B8935A" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="412" r="3" fill="#B8935A"/>
  <line x1="272" y1="412" x2="332" y2="412" stroke="#B8935A" stroke-width="1.5" opacity="0.5"/>
  <text x="256" y="450" font-family="'SF Mono', monospace" font-size="20" letter-spacing="6" fill="#B8935A" opacity="0.6" text-anchor="middle">N E X U S</text>
</svg>
