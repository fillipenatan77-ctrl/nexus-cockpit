<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F0E17">
<title>NEXUS · offline</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0F0E17;color:#F0EAE4;height:100%;font-family:Georgia,serif;-webkit-font-smoothing:antialiased}
  body{display:flex;align-items:center;justify-content:center;padding:2rem;min-height:100vh}
  .wrap{max-width:520px;text-align:center}
  .glyph{font-size:5rem;color:#B8935A;opacity:.5;font-style:italic;line-height:1}
  h1{font-size:2.5rem;margin:1.5rem 0 .5rem;letter-spacing:-.01em}
  .accent{color:#B8935A;font-style:italic;font-weight:400}
  p{color:rgba(240,234,228,.7);line-height:1.6;margin:.8rem 0}
  .cite{margin-top:2.5rem;padding-top:2rem;border-top:1px solid rgba(184,147,90,.15);font-size:1.05rem;line-height:1.5;font-style:italic}
  .cite small{display:block;margin-top:.8rem;font-style:normal;color:#B8935A;font-size:.85rem}
  button{margin-top:2rem;background:transparent;border:1px solid rgba(184,147,90,.4);color:#B8935A;padding:.7rem 1.6rem;border-radius:999px;font-family:inherit;font-size:.95rem;cursor:pointer;transition:all .2s}
  button:hover{background:rgba(184,147,90,.1)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="glyph">§</div>
    <h1>Sem <span class="accent">rede</span>.<br>Com <span class="accent">tempo</span>.</h1>
    <p>O cockpit está fora do ar, mas o NEXUS não depende dele para pensar.</p>
    <p style="color:rgba(240,234,228,.5);font-size:.9rem">Quando a conexão voltar, tudo sincroniza automaticamente.</p>
    <div class="cite">
      "O inconsciente é a parte do discurso que falta à disposição do sujeito
      para restabelecer a continuidade."
      <small>— Jacques Lacan · 1953</small>
    </div>
    <button onclick="location.reload()">tentar de novo</button>
  </div>
</body>
</html>
