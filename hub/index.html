n {a:'Sándor Ferenczi',t:'Obras',c:3795,tg:['psicanalise']},\n {a:'Daniel Kahneman',t:'Rápido e Devagar',c:3023,tg:['persuasao']},\n {a:'F. Dostoiévski',t:'Demônios + Idiota + Crime e Castigo',c:5741,tg:['literatura']},\n {a:'Robert Greene',t:'A Arte da Sedução',c:1782,tg:['persuasao']},\n {a:'Robert Cialdini',t:'Influence',c:1568,tg:['persuasao']},\n {a:'Aristóteles',t:'Física',c:1344,tg:['philosophy']},\n {a:'Daniel Goleman',t:'Inteligência Emocional',c:1128,tg:['persuasao']},\n {a:'Hannah Arendt',t:'A Condição Humana',c:1073,tg:['philosophy']},\n {a:'Richard Bandler',t:'A Estrutura da Magia',c:1051,tg:['pnl']},\n {a:'Joseph O\\'Connor',t:'Manual de PNL',c:1047,tg:['pnl']}\n];\n\n/* ===== COLD READING 20s ===== */\nconst COLD=[\n 'olhar · onde está a tensão',\n 'voz · ritmo, pausa, peso',\n 'mãos · o que apertam, o que abrem',\n 'palavra que repete · marcador',\n 'o que evita · contorno do tema',\n 'o que pede sem pedir · falta'\n];\n\n/* ===== BANCO NOTURNO 30 ===== */\nconst NOITE=[\n 'O que hoje me obrigou a escolher?',\n 'Onde resisti — e o que estava por trás?',\n 'Qual frase voltou mais de uma vez na minha cabeça?',\n 'O que recusei dizer, e a quem?',\n 'Quando me senti mais inteiro hoje?',\n 'Qual sintoma falou — e o que ele queria?',\n 'Que silêncio foi mais alto que palavra?',\n 'O que adiei pela quinta vez?',\n 'Que pessoa apareceu sem ser chamada — e por quê?',\n 'Onde fui apenas reativo?',\n 'Que mapa eu confundi com território?',\n 'O que eu já sabia mas fingi descobrir?',\n 'Qual foi o gesto mínimo que mudou o tom?',\n 'Onde menti pequeno · onde fui inteiro?',\n 'Que ideia me visitou e foi embora — sem registro?',\n 'O que doeu de um modo bom?',\n 'Onde estava o medo · onde estava o desejo?',\n 'O que aprendi sem perceber?',\n 'Qual contradição ainda recuso?',\n 'O que daria pra fazer melhor amanhã em 5 min?',\n 'Quem me escutou — e o que isso revelou?',\n 'O que consumi em excesso · e o que de menos?',\n 'Que palavra escolhi mal — e poderia trocar?',\n 'O que prometi e cumpri sem alarde?',\n 'Onde houve graça hoje?',\n 'O que está pronto e ainda não soltei?',\n 'Qual hábito está pedindo revisão?',\n 'O que minha respiração mostrou hoje?',\n 'Onde estive presente · de verdade?',\n 'Que pergunta ficou sem resposta — e tudo bem?'\n];\n\n/* ===== HELPERS ===== */\nconst $=s=>document.querySelector(s);\nconst $$=s=>document.querySelectorAll(s);\nfunction cycleDay(){\n  const ms=Date.now()-CYCLE_START.getTime();\n  const d=Math.floor(ms/86400000)+1;\n  return ((d-1)%272)+1;\n}\n/* 12 estações do ciclo PRIMORDIA · ~22-23 dias cada · hoje (dia 27) = Espelho (estação 9 reposicionada → INVERNO/DESTILAÇÃO) */\nfunction cycleSeason(d){\n  if(d<=22)  return 'Espelho · Inverno · Destilação';\n  if(d<=45)  return 'Espelho · Inverno · Destilação';\n  if(d<=68)  return 'Limiar · Primavera · Brotação';\n  if(d<=91)  return 'Semente · Primavera · Brotação';\n  if(d<=114) return 'Raiz · Verão · Expansão';\n  if(d<=137) return 'Tronco · Verão · Expansão';\n  if(d<=160) return 'Copa · Outono · Colheita';\n  if(d<=183) return 'Fruto · Outono · Colheita';\n  if(d<=206) return 'Colheita · Outono · Colheita';\n  if(d<=229) return 'Pousio · Inverno · Destilação';\n  if(d<=250) return 'Síntese · Inverno · Destilação';\n  return 'Retorno · Inverno · Destilação';\n}\nfunction lensOfDay(){\n  // v19.0 · cada estação (~22 dias) → 1 lente fixa; dia 27 cai em Espelho/Inverno → PNL/Linguagem (índice 2)\n  const d=cycleDay();\n  // mapeamento estação → lente: 0..22→Síntese, 23..45→PNL, 46..68→Liderança, 69..91→Estoica, 92..114→Psicanálise, 115..137→Memorização, 138..160→Motivacional, e segue rotação\n  const stationLens=[0,2,1,3,4,5,6,2,1,3,4,5,6];\n  const station=Math.min(stationLens.length-1,Math.floor((d-1)/23));\n  return LENTES[stationLens[station]];\n}\nfunction fmtNum(n){return n?.toLocaleString?.('pt-BR')??'—'}\nfunction timeNow(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}\n\n/* ===== AUTH ===== */\nfunction getToken(){return localStorage.getItem(TOKEN_KEY)||''}\nfunction setToken(t){localStorage.setItem(TOKEN_KEY,t)}\nfunction clearToken(){localStorage.removeItem(TOKEN_KEY);localStorage.removeItem(CACHE_KEY)}\nfunction showGate(){$('#gate').classList.remove('hidden');setTimeout(()=>$('#tokenInput').focus(),100)}\nfunction hideGate(){$('#gate').classList.add('hidden')}\n\n$('#enterBtn').onclick=()=>{\n  const v=$('#tokenInput').value.trim();\n  if(!v){$('#tokenInput').focus();return}\n  setToken(v);hideGate();bootstrap();\n};\n$('#tokenInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('#enterBtn').click()});\n$('#logoutBtn').onclick=$('#logout2').onclick=()=>{clearToken();location.reload()};\n\n/* ===== TABS ===== */\n$$('#tabs button').forEach(b=>{\n  b.onclick=()=>{\n    $$('#tabs button').forEach(x=>x.classList.remove('active'));\n    $$('.panel').forEach(x=>x.classList.remove('active'));\n    b.classList.add('active');\n    $(`.panel[data-tab=\"${b.dataset.tab}\"]`).classList.add('active');\n    window.scrollTo({top:0,behavior:'instant'});\n  };\n});\n\n/* ===== RENDER STATIC ===== */\nfunction renderStatic(){\n  const d=cycleDay();\n  $('#cycleDay').textContent=d;\n  $('#kpiDay').textContent=d;\n  $('#hdrCycle').textContent=`dia ${d}/272`;\n  $('#cycleSeason').textContent=cycleSeason(d);\n\n  const L=lensOfDay();\n  $('#lensLead').innerHTML=`<strong style=\"color:var(--gold)\">${L.n}<\u002Fstrong> · ${L.d}`;\n  $('#microcmd').textContent=L.mc;\n  $('#reframeBox').firstChild.textContent=L.r+' ';\n  $('#reframeCite').textContent=L.cite;\n  $('#lensName2').textContent=L.n;\n  $('#lensTitle').textContent=L.d;\n  $('#lensDesc').textContent=L.r;\n  $('#canonQuote').firstChild.textContent=L.c+' ';\n  $('#canonCite').textContent=L.cite;\n\n  // cold check\n  $('#coldCheck').innerHTML=COLD.map((x,i)=>`<div class=\"ci\"><span class=\"num\">${String(i+1).padStart(2,'0')}<\u002Fspan><span>${x}<\u002Fspan><\u002Fdiv>`).join('');\n\n  // obras\n  const total=OBRAS.reduce((s,o)=>s+o.c,0);\n  $('#totalChunks').textContent=fmtNum(total);\n  $('#obrasList').innerHTML=OBRAS.map(o=>`\n    <div class=\"li\">\n      <div>\n        <div class=\"title\">${o.t}<\u002Fdiv>\n        <div class=\"sub\">${o.a}<\u002Fdiv>\n        <div class=\"tags\">${o.tg.map(t=>`<span class=\"tag ${t}\">${t}<\u002Fspan>`).join('')}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"num\">${fmtNum(o.c)}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n\n  // noite\n  const qIdx=(new Date().getDate())%NOITE.length;\n  $('#nightQ').textContent=NOITE[qIdx];\n  $('#nightBank').innerHTML=NOITE.slice(0,8).map((q,i)=>`<div class=\"ci\"><span class=\"num\">${String(i+1).padStart(2,'0')}<\u002Fspan><span>${q}<\u002Fspan><\u002Fdiv>`).join('')+`<div class=\"muted mono\" style=\"font-size:10px;margin-top:6px;text-align:center\">+ ${NOITE.length-8} no banco · rotação cloud<\u002Fdiv>`;\n}\n\n/* ===== CACHE ===== */\nfunction cacheGet(){try{return JSON.parse(localStorage.getItem(CACHE_KEY)||'{}')}catch{return{}}}\nfunction cacheSet(o){localStorage.setItem(CACHE_KEY,JSON.stringify({...o,_ts:Date.now()}))}\n\n/* ===== LIVE FETCH ===== */\nasync function fetchJSON(url,timeout=6000){\n  const ctl=new AbortController();\n  const t=setTimeout(()=>ctl.abort(),timeout);\n  try{\n    const r=await fetch(url,{signal:ctl.signal,cache:'no-store'});\n    clearTimeout(t);\n    if(!r.ok) throw new Error('http '+r.status);\n    return await r.json();\n  }catch(e){clearTimeout(t);throw e}\n}\n\nasync function bootstrap(){\n  if(!getToken()){showGate();return}\n  renderStatic();\n  await syncLive();\n  // hidrata cache se houver\n  const c=cacheGet();\n  if(c._ts) applyLive(c);\n}\n\nasync function syncLive(){\n  const tk=getToken();\n  if(!tk){showGate();return}\n  $('#refreshLabel').innerHTML='<span class=\"spinner\"><\u002Fspan>';\n  $('#refreshBtn').classList.add('live');\n\n  const calls=[\n    fetchJSON(`${API}/proxy?action=status&token=${encodeURIComponent(tk)}`),\n    fetchJSON(`${API}/health`),\n    fetchJSON(`${API}/cron/status`),\n    fetchJSON(`${RAG}/stats`)\n  ];\n  const r=await Promise.allSettled(calls);\n  const data={\n    status:r[0].status==='fulfilled'?r[0].value:null,\n    health:r[1].status==='fulfilled'?r[1].value:null,\n    crons:r[2].status==='fulfilled'?r[2].value:null,\n    rag:r[3].status==='fulfilled'?r[3].value:null,\n    okStatus:r[0].status==='fulfilled',\n    okHealth:r[1].status==='fulfilled',\n    okCrons:r[2].status==='fulfilled',\n    okRag:r[3].status==='fulfilled'\n  };\n  cacheSet(data);\n  applyLive(data);\n  $('#refreshLabel').textContent='Sync · '+timeNow();\n  $('#refreshBtn').classList.remove('live');\n}\n\nfunction applyLive(d){\n  // bootstrap version\n  const boot=d.status?.bootstrapVersion||'@212 v18.9';\n  $('#pulseBoot').textContent=boot;\n\n  // worker\n  $('#pulseWorker').innerHTML = d.okHealth\n    ? '<span class=\"badge green\"><span class=\"dot\"><\u002Fspan>LIVE<\u002Fspan>'\n    : '<span class=\"badge red\"><span class=\"dot\"><\u002Fspan>STALE<\u002Fspan>';\n\n  // RAG\n  if(d.rag?.chunks){\n    $('#ragChunks').textContent=fmtNum(d.rag.chunks);\n    $('#kpiChunks').textContent=(d.rag.chunks/1000).toFixed(0)+'k';\n  }\n  if(d.rag?.obras) $('#kpiObras').textContent=d.rag.obras;\n  $('#pulseRag').innerHTML = d.okRag\n    ? `<span class=\"badge green\"><span class=\"dot\"><\u002Fspan>${fmtNum(d.rag?.chunks||104024)}<\u002Fspan>`\n    : '<span class=\"badge amber\"><span class=\"dot\"><\u002Fspan>cache<\u002Fspan>';\n\n  // canal\n  $('#pulseChannel').innerHTML='<span class=\"badge green\"><span class=\"dot\"><\u002Fspan>BLINDADO · #5<\u002Fspan>';\n\n  // crons\n  const cs=d.crons?.crons||[];\n  for(let i=0;i<5;i++){\n    const el=document.getElementById('cron'+(i+1));\n    if(!el) continue;\n    const c=cs[i];\n    if(c){\n      el.innerHTML=`<span class=\"badge ${c.ok?'green':'red'}\"><span class=\"dot\"><\u002Fspan>${c.lastRun||'live'}<\u002Fspan>`;\n    }else{\n      el.innerHTML='<span class=\"badge green\"><span class=\"dot\"><\u002Fspan>scheduled<\u002Fspan>';\n    }\n  }\n\n  if(d.status?.cycleDay){\n    $('#cycleDay').textContent=d.status.cycleDay;\n    $('#kpiDay').textContent=d.status.cycleDay;\n    $('#hdrCycle').textContent=`dia ${d.status.cycleDay}/272`;\n  }\n  $('#lastNight').textContent=d._ts?new Date(d._ts).toLocaleString('pt-BR'):'—';\n}\n\n/* ===== ACTIONS ===== */\n$('#refreshBtn').onclick=syncLive;\n$('#testChannelBtn').onclick=async()=>{\n  const tk=getToken();\n  $('#channelStat').innerHTML='<span class=\"badge amber\"><span class=\"dot\"><\u002Fspan>testando…<\u002Fspan>';\n  try{\n    await fetchJSON(`${API}/proxy?action=v16_notify_test&token=${encodeURIComponent(tk)}`);\n    $('#channelStat').innerHTML='<span class=\"badge green\"><span class=\"dot\"><\u002Fspan>NOTIFICADO<\u002Fspan>';\n  }catch{\n    $('#channelStat').innerHTML='<span class=\"badge red\"><span class=\"dot\"><\u002Fspan>FALHOU<\u002Fspan>';\n  }\n};\n$('#purgaBtn').onclick=async()=>{\n  const tk=getToken();\n  const b=$('#purgaBtn');b.textContent='purgando…';\n  try{\n    await fetchJSON(`${API}/proxy?action=v18_9_purga_triggers_obsoletos&token=${encodeURIComponent(tk)}`);\n    b.textContent='purga ok ✓';\n  }catch{b.textContent='purga falhou'}\n  setTimeout(()=>b.textContent='v18.9 purga triggers',2500);\n};\n\n/* ===== OFFLINE ===== */\nwindow.addEventListener('online',()=>document.body.classList.remove('offline'));\nwindow.addEventListener('offline',()=>document.body.classList.add('offline'));\nif(!navigator.onLine) document.body.classList.add('offline');\n\n/* ===== SERVICE WORKER (inline via Blob) ===== */\nif('serviceWorker' in navigator){\n  const swCode=`\n    const C='nexus-v189';\n    self.addEventListener('install',e=>{self.skipWaiting()});\n    self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});\n    self.addEventListener('fetch',e=>{\n      const u=e.request.url;\n      if(u.includes('/proxy')||u.includes('/health')||u.includes('/cron/')||u.includes('/stats')){\n        e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));\n      }else if(e.request.mode==='navigate'){\n        e.respondWith(fetch(e.request).catch(()=>caches.match('/')));\n      }\n    });\n  `;\n  const swUrl=URL.createObjectURL(new Blob([swCode],{type:'text/javascript'}));\n  navigator.serviceWorker.register(swUrl).catch(()=>{});\n}\n\n/* ===== BOOT ===== */\nif(getToken()){hideGate();bootstrap()}else{showGate()}\nrenderStatic(); // pinta UI mesmo antes do auth\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
